<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Number Slide</title>

<!-- PWA: web app manifest -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a1a1a" />

<!-- PWA: iOS / Safari home-screen install -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Number Slide" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
  :root {
    --bg: #1a1a1a;
    --board: #000000;
    --accent: #5b8def;
    --board-size: min(92vmin, 460px);
    --raised:
      inset 2px 2px 3px rgba(255, 255, 255, 0.85),
      inset -2px -2px 4px rgba(0, 0, 0, 0.18),
      0 2px 3px rgba(0, 0, 0, 0.55);
    --raised-hover:
      inset 2px 2px 4px rgba(255, 255, 255, 0.95),
      inset -2px -2px 5px rgba(0, 0, 0, 0.22),
      0 4px 6px rgba(0, 0, 0, 0.65);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding:
      max(24px, env(safe-area-inset-top))
      max(24px, env(safe-area-inset-right))
      max(24px, env(safe-area-inset-bottom))
      max(24px, env(safe-area-inset-left));
    -webkit-tap-highlight-color: transparent;
  }

  .tile, button { touch-action: manipulation; }

  .hidden { display: none !important; }

  /* ---------- Home screen ---------- */
  #homeScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    color: #e2e8f0;
    text-align: center;
  }

  #homeScreen h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  #homeScreen .subtitle {
    color: #64748b;
    margin: 0 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.8rem;
  }

  #levelChoices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: min(92vmin, 360px);
  }

  .level-btn {
    background: #1f2937;
    border: 1px solid #334155;
    color: #e2e8f0;
    border-radius: 12px;
    padding: 18px 16px;
    cursor: pointer;
    text-align: center;
    transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
  }

  .level-btn:hover {
    background: #273449;
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .level-btn .lvl-num {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 4px;
  }

  .level-btn .lvl-size {
    display: block;
    font-size: 1.4rem;
    font-weight: 700;
  }

  .level-btn .lvl-pb {
    display: block;
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }

  #homeClose {
    margin-top: 8px;
  }

  /* ---------- Resting (exit) screen ---------- */
  #restingScreen {
    /* Fill the viewport so the swipe-up hint can sit at the true bottom. */
    position: fixed;
    inset: 0;
    background: var(--bg);
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding:
      max(24px, env(safe-area-inset-top))
      24px
      max(24px, env(safe-area-inset-bottom))
      24px;
    z-index: 20;
  }

  #restingScreen .resting-title {
    margin: 0 0 14px;
    font-size: 1.8rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #e2e8f0;
  }

  #restingScreen .resting-msg {
    margin: 0;
    font-size: 0.95rem;
    color: #94a3b8;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Soft swipe-up cue at the bottom of the resting screen. */
  #swipeHint {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom) + 24px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: #64748b;
    pointer-events: none;
  }

  #swipeHint .swipe-arrow {
    width: 26px;
    height: 26px;
    color: #94a3b8;
    opacity: 0;
    animation: swipe-rise 2.8s ease-in-out infinite;
    will-change: transform, opacity;
  }

  #swipeHint .swipe-text {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    color: #64748b;
  }

  @keyframes swipe-rise {
    0%   { transform: translateY(10px); opacity: 0; }
    20%  { opacity: 0.55; }
    70%  { opacity: 0.55; }
    100% { transform: translateY(-16px); opacity: 0; }
  }

  /* ---------- Game screen ---------- */
  #gameScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #appTitle {
    margin: 0;
    font-size: 1.4rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: #e2e8f0;
    text-transform: uppercase;
  }

  #levelLabel {
    font-weight: 600;
    letter-spacing: 0.04em;
    margin: 0;
    font-size: 1.05rem;
    color: #94a3b8;
    text-transform: uppercase;
  }

  #statusBar {
    width: var(--board-size);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    color: #cbd5e1;
    font-variant-numeric: tabular-nums;
    padding: 0 4px;
  }

  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    display: block;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-value {
    font-size: 1.3rem;
    font-weight: 600;
    color: #e2e8f0;
    line-height: 1;
  }

  #pbBlock { text-align: right; }

  #board {
    --n: 3;
    display: grid;
    grid-template-columns: repeat(var(--n), 1fr);
    grid-template-rows: repeat(var(--n), 1fr);
    gap: 2px;
    padding: 6px;
    background: var(--board);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    width: var(--board-size);
    aspect-ratio: 1 / 1;
    user-select: none;
  }

  .tile {
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--board-size) / (var(--n) * 3));
    font-weight: 700;
    color: #2b2b2b;
    cursor: pointer;
    box-shadow: var(--raised);
    transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
  }
  .tile:hover {
    box-shadow: var(--raised-hover);
    filter: brightness(1.06);
    transform: translateY(-1px);
  }
  .tile.empty {
    background: transparent !important;
    box-shadow: none;
    cursor: default;
    pointer-events: none;
  }

  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 120ms ease, transform 120ms ease;
  }
  button:hover { background: #4a78d8; transform: translateY(-1px); }

  button.secondary { background: #334155; }
  button.secondary:hover { background: #475569; }

  button.danger { background: #b91c1c; }
  button.danger:hover { background: #991b1b; }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }
  button:disabled:hover {
    background: var(--accent);
    transform: none;
  }
  button.secondary:disabled:hover { background: #334155; }

  #boardWrap {
    position: relative;
    width: var(--board-size);
    aspect-ratio: 1 / 1;
  }

  #pauseCurtain {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.92);
    color: #e2e8f0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 2;
    user-select: none;
  }
  #boardWrap.paused #pauseCurtain { display: flex; }

  /* "You did it!" curtain — sits softly over the completed grid.
     Uses a gentle light veil + slight blur to brighten the pastels so the
     dark text below reads cleanly against any tile colour. */
  #winCurtain {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 16px;
    background: rgba(255, 255, 255, 0.22);
    -webkit-backdrop-filter: blur(0.5px);
    backdrop-filter: blur(0.5px);
    color: #0f172a;
    /* very soft white halo — softens any tile edge bleeding through */
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.55);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 900ms ease, visibility 0s linear 900ms;
    z-index: 3;
    user-select: none;
    text-align: center;
  }
  #winCurtain.show {
    opacity: 1;
    visibility: visible;
    transition: opacity 900ms ease, visibility 0s linear 0s;
  }

  #winCurtain .win-headline {
    font-size: clamp(2.8rem, 10vmin, 4.4rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.1;
    color: #0b1220; /* near-black slate — strong, easy to read */
  }
  #winCurtain .win-stats {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    font-size: clamp(1.05rem, 3.2vmin, 1.35rem);
    letter-spacing: 0.06em;
    color: #1e293b; /* slate-800 */
  }
  #winCurtain .win-newpb {
    margin-top: 6px;
    font-size: clamp(1.1rem, 3.4vmin, 1.4rem);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #166534; /* deeper, calm green — clearly legible without flashing */
  }
  #winCurtain .win-newpb.hidden { display: none; }

  /* Floating Play Again / I'm Done — drift gently over the finished grid. */
  #floatingButtons {
    position: fixed;
    inset: 0;
    z-index: 6;
    pointer-events: none; /* taps pass through except on the buttons */
    opacity: 0;
    visibility: hidden;
    transition: opacity 800ms ease, visibility 0s linear 800ms;
  }
  #floatingButtons.show {
    opacity: 1;
    visibility: visible;
    transition: opacity 800ms ease, visibility 0s linear 0s;
  }

  .float-btn {
    position: absolute;
    pointer-events: auto;
    color: white;
    border: none;
    border-radius: 999px;
    padding: 16px 30px;
    min-width: 140px;
    min-height: 52px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    will-change: transform;
  }

  #floatBtnPlayAgain {
    top: 38%;
    left: 14%;
    background: rgba(91, 141, 239, 0.8);     /* accent blue at ~80% */
    animation: drift-a 22s ease-in-out infinite;
  }
  #floatBtnDone {
    top: 58%;
    right: 14%;
    background: rgba(51, 65, 85, 0.8);       /* slate at ~80% */
    animation: drift-b 26s ease-in-out infinite -3s;
  }

  /* Subtle, slow looping drifts. Small deltas so buttons stay reachable. */
  @keyframes drift-a {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(26px, -20px); }
    50%  { transform: translate(-10px, -30px); }
    75%  { transform: translate(-28px, 14px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes drift-b {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-22px, 18px); }
    50%  { transform: translate(14px, 26px); }
    75%  { transform: translate(24px, -16px); }
    100% { transform: translate(0, 0); }
  }

  /* When the puzzle is solved, hide the standard pause/stop controls so
     the floating buttons are the only post-completion interaction. */
  #gameScreen.solved #gameControls { display: none; }

  #gameControls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 28px; /* keep pause/stop well clear of the grid */
  }

  /* ---------- Modals (win / confirm) ---------- */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    z-index: 10;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 700ms ease, visibility 0s linear 700ms;
  }
  .modal.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transition: opacity 700ms ease, visibility 0s linear 0s;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    max-width: 380px;
  }

  .card h2 {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 1.4rem;
  }

  .card p { margin: 0 0 6px; color: #64748b; }

  .card .pb-flag {
    color: #16a34a;
    font-weight: 700;
    margin: 6px 0 16px;
  }
  .card .pb-flag.hidden { display: none; }

  .card .time-line {
    font-size: 1.1rem;
    color: #0f172a;
    margin: 4px 0 14px;
    font-variant-numeric: tabular-nums;
  }

  .card .buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 14px;
  }
</style>
</head>
<body>

  <!-- ============ HOME SCREEN ============ -->
  <div id="homeScreen">
    <h1>Number Slide</h1>
    <p class="subtitle">Choose your level</p>
    <div id="levelChoices"><!-- level buttons injected by JS --></div>
    <button id="homeClose" class="danger">Close game</button>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="gameScreen" class="hidden">
    <h1 id="appTitle">Pastel Push</h1>
    <p id="levelLabel">Level 1 — 3×3</p>

    <div id="statusBar">
      <div id="timerBlock">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">00:00</span>
      </div>
      <div id="pbBlock">
        <span class="stat-label">Personal Best</span>
        <span class="stat-value" id="pb">—</span>
      </div>
    </div>

    <div id="boardWrap">
      <div id="board" aria-label="slide puzzle board"></div>
      <div id="pauseCurtain">Paused</div>
      <div id="winCurtain">
        <div class="win-headline">You did it!</div>
        <div class="win-stats">
          <div id="winTimeLine">Time —</div>
          <div id="winBestLine">Best —</div>
        </div>
        <div id="winNewPb" class="win-newpb hidden">New personal best!</div>
      </div>
    </div>

    <div id="gameControls">
      <button id="pauseBtn" class="secondary" disabled>Pause</button>
      <button id="stopBtn" class="danger">Stop</button>
    </div>
  </div>

  <!-- ============ POST-COMPLETION FLOATING BUTTONS ============ -->
  <div id="floatingButtons" aria-hidden="true">
    <button id="floatBtnPlayAgain" class="float-btn">Play Again</button>
    <button id="floatBtnDone" class="float-btn">I'm Done</button>
  </div>

  <!-- ============ QUIT CONFIRM MODAL ============ -->
  <div id="confirmModal" class="modal" role="dialog" aria-modal="true">
    <div class="card">
      <h2>Quit game?</h2>
      <p>Are you sure you want to quit the game?</p>
      <p style="color:#94a3b8;font-size:0.85rem;margin-top:4px;">Your timer for this level will be lost.</p>
      <div class="buttons">
        <button id="confirmNoBtn" class="secondary">No</button>
        <button id="confirmYesBtn" class="danger">Yes</button>
      </div>
    </div>
  </div>

  <!-- ============ RESTING (EXIT) SCREEN ============ -->
  <div id="restingScreen" class="hidden">
    <h1 class="resting-title">Pastel Push</h1>
    <p class="resting-msg">See you next time.</p>

    <div id="swipeHint">
      <!-- Calm upward chevron — pulses up and fades, suggesting swipe-up to exit. -->
      <svg class="swipe-arrow" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 14l6-6 6 6" />
      </svg>
      <span class="swipe-text">swipe up to leave</span>
    </div>
  </div>

<script>
  const LEVELS = [
    { n: 3 }, // Level 1: 1-8
    { n: 4 }, // Level 2: 1-15
    { n: 5 }, // Level 3: 1-24
    { n: 6 }, // Level 4: 1-35
  ];

  const PB_STORAGE_KEY = 'slidePuzzle.personalBests.v1';

  // Elements
  const homeScreen = document.getElementById('homeScreen');
  const gameScreen = document.getElementById('gameScreen');
  const levelChoices = document.getElementById('levelChoices');
  const homeClose = document.getElementById('homeClose');

  const board = document.getElementById('board');
  const boardWrap = document.getElementById('boardWrap');
  const winCurtain = document.getElementById('winCurtain');
  const levelLabel = document.getElementById('levelLabel');
  const timerEl = document.getElementById('timer');
  const pbEl = document.getElementById('pb');

  // Completion moment ("You did it!" curtain) stat lines
  const winTimeLine = document.getElementById('winTimeLine');
  const winBestLine = document.getElementById('winBestLine');
  const winNewPb = document.getElementById('winNewPb');

  // Post-completion floating buttons
  const floatingButtons = document.getElementById('floatingButtons');
  const floatBtnPlayAgain = document.getElementById('floatBtnPlayAgain');
  const floatBtnDone = document.getElementById('floatBtnDone');

  const stopBtn = document.getElementById('stopBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  const confirmModal = document.getElementById('confirmModal');
  const confirmYesBtn = document.getElementById('confirmYesBtn');
  const confirmNoBtn = document.getElementById('confirmNoBtn');

  // Resting / exit screen
  const restingScreen = document.getElementById('restingScreen');

  // Game state
  let levelIdx = 0;
  let n = LEVELS[0].n;
  let tiles = [];

  // Timer state
  let timerStartedAt = null;
  let timerInterval = null;
  let finishedAt = null;
  let paused = false;
  let pausedAt = null;

  // Holds the timeout that hands off from the "You did it!" curtain to the
  // results modal, so we can cancel it if the player navigates away first.
  let winCurtainTimeout = null;

  // Tracks whether the player was already paused when they hit Stop —
  // so that hitting "No" on the confirm doesn't un-pause them.
  let wasPausedBeforeConfirm = false;

  // ---------- Persistent personal bests ----------
  function loadPBs() {
    try {
      const raw = localStorage.getItem(PB_STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }
  function savePBs(pbs) {
    try { localStorage.setItem(PB_STORAGE_KEY, JSON.stringify(pbs)); } catch {}
  }
  function getPB(levelN) {
    const v = loadPBs()[String(levelN)];
    return typeof v === 'number' ? v : null;
  }
  function setPB(levelN, ms) {
    const pbs = loadPBs();
    pbs[String(levelN)] = ms;
    savePBs(pbs);
  }

  // ---------- Time formatting ----------
  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    const pad = x => String(x).padStart(2, '0');
    return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  }

  // ---------- Puzzle logic ----------
  function solvedState() {
    const arr = [];
    for (let i = 1; i < n * n; i++) arr.push(i);
    arr.push(0);
    return arr;
  }
  function emptyIndex() { return tiles.indexOf(0); }
  function neighbors(idx) {
    const r = Math.floor(idx / n);
    const c = idx % n;
    const out = [];
    if (r > 0) out.push(idx - n);
    if (r < n - 1) out.push(idx + n);
    if (c > 0) out.push(idx - 1);
    if (c < n - 1) out.push(idx + 1);
    return out;
  }
  function shuffle() {
    tiles = solvedState();
    let prev = -1;
    const moves = n * n * 25;
    for (let i = 0; i < moves; i++) {
      const empty = emptyIndex();
      const opts = neighbors(empty).filter(x => x !== prev);
      const pick = opts[Math.floor(Math.random() * opts.length)];
      [tiles[empty], tiles[pick]] = [tiles[pick], tiles[empty]];
      prev = empty;
    }
    if (isSolved()) shuffle();
  }
  function isSolved() {
    for (let i = 0; i < n * n - 1; i++) {
      if (tiles[i] !== i + 1) return false;
    }
    return true;
  }
  function tileColor(value, count) {
    const hue = count <= 1 ? 0 : ((value - 1) / (count - 1)) * 300;
    return `hsl(${hue}, 80%, 85%)`;
  }
  function render() {
    board.style.setProperty('--n', n);
    board.innerHTML = '';
    const tileCount = n * n - 1;
    tiles.forEach((val, idx) => {
      const el = document.createElement('div');
      el.className = 'tile';
      if (val === 0) {
        el.classList.add('empty');
      } else {
        el.style.background = tileColor(val, tileCount);
        el.textContent = val;
        el.addEventListener('click', () => tryMove(idx));
      }
      board.appendChild(el);
    });
  }
  function tryMove(idx) {
    if (finishedAt !== null) return;
    if (paused) return;
    if (confirmModal.classList.contains('show')) return;
    const empty = emptyIndex();
    if (!neighbors(idx).includes(empty)) return;

    [tiles[idx], tiles[empty]] = [tiles[empty], tiles[idx]];
    render();

    if (timerStartedAt === null) {
      startTimer();
      pauseBtn.disabled = false;
    }
    if (isSolved()) handleWin();
  }

  // ---------- Timer ----------
  function updateTimerDisplay() {
    if (timerStartedAt === null) { timerEl.textContent = '00:00'; return; }
    const end = finishedAt ?? Date.now();
    timerEl.textContent = formatTime(end - timerStartedAt);
  }
  function startTimer() {
    timerStartedAt = Date.now();
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 250);
  }
  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }
  function resetTimer() {
    stopTimer();
    timerStartedAt = null;
    finishedAt = null;
    paused = false;
    pausedAt = null;
    boardWrap.classList.remove('paused');
    pauseBtn.textContent = 'Pause';
    pauseBtn.disabled = true;
    // Cancel any pending hand-off from the "You did it!" curtain.
    if (winCurtainTimeout) { clearTimeout(winCurtainTimeout); winCurtainTimeout = null; }
    winCurtain.classList.remove('show');
    // Drop the post-completion state — pause/stop become visible again,
    // floating buttons hide.
    gameScreen.classList.remove('solved');
    floatingButtons.classList.remove('show');
    updateTimerDisplay();
  }
  function pauseTimer() {
    if (paused || timerStartedAt === null || finishedAt !== null) return;
    paused = true;
    pausedAt = Date.now();
    stopTimer();
    boardWrap.classList.add('paused');
    pauseBtn.textContent = 'Resume';
  }
  function resumeTimer() {
    if (!paused) return;
    timerStartedAt += (Date.now() - pausedAt);
    paused = false;
    pausedAt = null;
    boardWrap.classList.remove('paused');
    pauseBtn.textContent = 'Pause';
    timerInterval = setInterval(updateTimerDisplay, 250);
    updateTimerDisplay();
  }

  // ---------- Screen / level management ----------
  function updatePBDisplay() {
    const pb = getPB(n);
    pbEl.textContent = pb === null ? '—' : formatTime(pb);
  }
  function updateLevelLabel() {
    levelLabel.textContent = `Level ${levelIdx + 1} — ${n}×${n}`;
  }

  function showHome() {
    // Clean up game state
    resetTimer();
    confirmModal.classList.remove('show');
    gameScreen.classList.add('hidden');
    restingScreen.classList.add('hidden');
    homeScreen.classList.remove('hidden');
    renderLevelChoices();
  }

  // Resting / exit screen. Personal-best scores are written to localStorage
  // synchronously at the moment they are achieved (see handleWin → setPB),
  // so they are already persisted by the time this screen is shown.
  // Nothing here clears them, so they survive the next app launch.
  function showRestingScreen() {
    resetTimer();
    confirmModal.classList.remove('show');
    gameScreen.classList.add('hidden');
    homeScreen.classList.add('hidden');
    restingScreen.classList.remove('hidden');
  }

  function startLevel(idx) {
    levelIdx = idx;
    n = LEVELS[idx].n;
    homeScreen.classList.add('hidden');
    restingScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    confirmModal.classList.remove('show');
    updateLevelLabel();
    updatePBDisplay();
    resetTimer();
    shuffle();
    render();
  }

  function renderLevelChoices() {
    levelChoices.innerHTML = '';
    LEVELS.forEach((lvl, i) => {
      const btn = document.createElement('button');
      btn.className = 'level-btn';
      const pb = getPB(lvl.n);
      btn.innerHTML = `
        <span class="lvl-num">Level ${i + 1}</span>
        <span class="lvl-size">${lvl.n}×${lvl.n}</span>
        <span class="lvl-pb">Best: ${pb === null ? '—' : formatTime(pb)}</span>
      `;
      btn.addEventListener('click', () => startLevel(i));
      levelChoices.appendChild(btn);
    });
  }

  function handleWin() {
    finishedAt = Date.now();
    stopTimer();
    updateTimerDisplay();

    const elapsed = finishedAt - timerStartedAt;
    const previousPB = getPB(n);
    const isNewPB = previousPB === null || elapsed < previousPB;

    // Persist the new personal best to localStorage immediately, so it
    // survives a close, refresh, or PWA restart.
    if (isNewPB) {
      setPB(n, elapsed);
      updatePBDisplay();
    }

    // What "Best" should the curtain show?
    //   • If we just beat the PB → show the new best (the time they just set)
    //   • Otherwise → show the existing PB (or em-dash if none)
    const bestToShow = isNewPB ? elapsed : previousPB;
    winTimeLine.textContent = `Time   ${formatTime(elapsed)}`;
    winBestLine.textContent =
      bestToShow === null ? 'Best   —' : `Best   ${formatTime(bestToShow)}`;
    if (isNewPB) {
      winNewPb.classList.remove('hidden');
    } else {
      winNewPb.classList.add('hidden');
    }

    // Calm completion moment: the curtain fades in over the finished grid
    // and holds for 10 seconds, showing time / best / (optional) new-PB
    // message. After the hold, fade the curtain out and bring in the
    // drifting floating buttons — no modal, grid stays visible throughout.
    gameScreen.classList.add('solved');     // hides pause/stop
    winCurtain.classList.add('show');
    winCurtainTimeout = setTimeout(() => {
      winCurtain.classList.remove('show');
      floatingButtons.classList.add('show');
      winCurtainTimeout = null;
    }, 10000);
  }

  // ---------- Button handlers ----------
  pauseBtn.addEventListener('click', () => {
    if (paused) resumeTimer(); else pauseTimer();
  });

  stopBtn.addEventListener('click', () => {
    // If the puzzle is already done, the floating buttons drive the exit
    // flow — Stop is no longer relevant. Guard anyway in case the button
    // becomes visible during a state edge case.
    if (finishedAt !== null) return;
    // Remember pause state so "No" doesn't accidentally resume them.
    wasPausedBeforeConfirm = paused;
    // Pause while confirming so the clock doesn't keep running.
    if (!paused) pauseTimer();
    confirmModal.classList.add('show');
  });

  // Confirming "Yes" on the quit dialog is the player choosing to close
  // the game → resting screen (PBs already saved, nothing reset).
  confirmYesBtn.addEventListener('click', () => {
    confirmModal.classList.remove('show');
    showRestingScreen();
  });

  confirmNoBtn.addEventListener('click', () => {
    confirmModal.classList.remove('show');
    // Only auto-resume if the player wasn't manually paused before they hit Stop.
    if (!wasPausedBeforeConfirm) resumeTimer();
  });

  // The home screen's "Close game" goes straight to the resting screen.
  homeClose.addEventListener('click', showRestingScreen);

  // Floating buttons: Play Again restarts the same level fresh; I'm Done
  // sends the player to the calm resting/exit screen.
  floatBtnPlayAgain.addEventListener('click', () => startLevel(levelIdx));
  floatBtnDone.addEventListener('click', showRestingScreen);

  // ---------- Boot ----------
  showHome();

  // ---------- PWA: register the service worker so the game works offline ----------
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker
        .register('service-worker.js')
        .catch((err) => console.error('Service worker registration failed:', err));
    });
  }
</script>
</body>
</html>
